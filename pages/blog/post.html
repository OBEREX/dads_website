<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Article — Dr. MKO Balogun</title>
  <meta name="description" id="page-desc" content="Article by Dr. MKO Balogun">
  <link rel="stylesheet" href="../../css/main.css">
  <style>
    .article-hero { background:var(--navy); padding:66px 44px 44px; }
    .article-hero h1 { font-size:48px; color:var(--white); max-width:760px; line-height:1.1; margin-bottom:22px; }
    .article-hero h1 em { font-style:italic; color:var(--gold); }
    .article-meta { display:flex; align-items:center; gap:18px; flex-wrap:wrap; }
    .article-meta .meta-tag  { font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); }
    .article-meta .meta-date { font-size:12px; color:rgba(255,255,255,0.45); }
    .article-meta .meta-sep  { width:1px; height:12px; background:rgba(255,255,255,0.15); }
    .article-body-wrap { background:var(--white); }
    .article-inner { max-width:760px; margin:0 auto; padding:66px 44px; }
    .article-inner p  { font-size:15px; color:#444; line-height:1.9; font-weight:300; margin-bottom:22px; }
    .article-inner h3 { font-family:var(--serif); font-size:26px; color:var(--navy); margin:36px 0 16px; }
    .article-inner ul { margin:0 0 22px 22px; }
    .article-inner ul li { font-size:15px; color:#444; line-height:1.8; font-weight:300; margin-bottom:8px; }
    .article-inner blockquote { border-left:2px solid var(--gold); padding:16px 22px; font-family:var(--serif); font-size:20px; font-style:italic; color:var(--navy); margin:28px 0; background:var(--cream); }
    .article-footer-strip { background:var(--cream); padding:44px; border-top:1px solid var(--border); display:flex; justify-content:space-between; align-items:center; flex-wrap:wrap; gap:20px; }
    .back-link { font-size:12px; letter-spacing:0.1em; text-transform:uppercase; color:var(--navy); border-bottom:1px solid var(--navy); text-decoration:none; padding-bottom:2px; }
    .share-row { display:flex; gap:10px; align-items:center; }
    .share-label { font-size:11px; letter-spacing:0.1em; text-transform:uppercase; color:var(--text-muted); }
    .share-btn { padding:8px 16px; border:1px solid var(--border); border-radius:2px; background:var(--white); font-size:11px; font-family:var(--sans); cursor:pointer; color:#444; text-decoration:none; transition:border-color 0.2s; }
    .share-btn:hover { border-color:var(--navy); }
    .related-section { background:var(--cream); padding:66px 44px; border-top:1px solid var(--border); }
    .related-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:22px; margin-top:36px; }
    .not-found { text-align:center; padding:120px 44px; }
    .not-found h2 { font-family:var(--serif); font-size:36px; color:var(--navy); margin-bottom:16px; }
    .not-found p  { color:var(--text-mid); margin-bottom:28px; }
    @media(max-width:768px){
      .article-hero { padding:44px 24px 32px; }
      .article-hero h1 { font-size:34px; }
      .article-inner { padding:44px 24px; }
      .related-grid { grid-template-columns:1fr; }
    }

    @media(max-width:768px){
      .article-hero{padding:44px 20px 32px;}
      .article-hero h1{font-size:28px;}
      .article-inner{padding:36px 20px;}
      .article-inner p{font-size:14px;}
      .article-inner h3{font-size:22px;}
      .article-footer-strip{padding:28px 20px;flex-direction:column;gap:14px;}
      .share-row{flex-wrap:wrap;gap:8px;}
      .related-grid{grid-template-columns:1fr;}
    }
    @media(max-width:480px){
      .article-hero h1{font-size:24px;}
      .article-inner blockquote{font-size:16px;padding:12px 16px;}
    }
  </style>
</head>
<body>
<div data-component="topbar"></div>
<div data-component="navbar"></div>

<div id="article-container">
  <div class="not-found" id="not-found" style="display:none;">
    <h2>Article Not Found</h2>
    <p>This article may have been moved or is coming soon.</p>
    <a href="../publications.html" class="btn-primary">← Back to Publications</a>
  </div>
</div>

<div data-component="footer"></div>

<script src="../../js/config.js"></script>
<script src="../../js/components.js"></script>
<script src="../../data/content.js"></script>
<script>
document.addEventListener("DOMContentLoaded", () => {
  // Get slug from filename
  const slug = window.location.hash.replace("#","") || window.location.pathname.split("/").pop().replace(".html","");

  // Search all content types
  const allContent = [
    ...CONTENT.blogPosts,
    ...CONTENT.articles,
    ...CONTENT.speeches,
  ];
  const item = allContent.find(c => c.slug === slug);

  if (!item) {
    document.getElementById("not-found").style.display = "block";
    return;
  }

  // Update page meta
  document.getElementById("page-title").textContent = `${item.title} — Dr. MKO Balogun`;
  document.getElementById("page-desc").content = item.excerpt || item.title;

  const container = document.getElementById("article-container");

  // Hero
  const hero = document.createElement("section");
  hero.className = "article-hero";
  hero.innerHTML = `
    <a href="../publications.html" style="font-size:11px;color:rgba(255,255,255,0.5);letter-spacing:0.1em;text-transform:uppercase;text-decoration:none;display:inline-block;margin-bottom:22px;">← Publications</a>
    <h1>${item.title}</h1>
    <div class="article-meta">
      <span class="meta-tag">${item.tag || item.type || "Article"}</span>
      <div class="meta-sep"></div>
      <span class="meta-date">${item.date || ""}</span>
      ${item.venue ? `<div class="meta-sep"></div><span class="meta-date">${item.venue}</span>` : ""}
    </div>`;
  container.insertBefore(hero, container.firstChild);

  // Body
  const bodyWrap = document.createElement("div");
  bodyWrap.className = "article-body-wrap";
  const inner = document.createElement("div");
  inner.className = "article-inner";

  if (item.content) {
    inner.innerHTML = item.content;
  } else if (item.excerpt) {
    inner.innerHTML = `<p>${item.excerpt}</p><p style="color:var(--text-muted);font-style:italic;">Full content coming soon. Check back for the complete article.</p>`;
  }

  // Download button for speeches
  if (item.downloadUrl) {
    const dlRow = document.createElement("div");
    dlRow.style.cssText = "margin-top:36px;padding-top:28px;border-top:1px solid var(--border);display:flex;gap:14px;flex-wrap:wrap;";
    dlRow.innerHTML = `<a href="${item.downloadUrl}" class="btn-primary" download>Download PDF</a>`;
    inner.appendChild(dlRow);
  }

  bodyWrap.appendChild(inner);
  container.appendChild(bodyWrap);

  // Footer strip
  const footerStrip = document.createElement("div");
  footerStrip.className = "article-footer-strip";
  footerStrip.innerHTML = `
    <a href="../publications.html" class="back-link">← Back to Publications</a>
    <div class="share-row">
      <span class="share-label">Share:</span>
      <a href="https://linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(window.location.href)}" target="_blank" class="share-btn">LinkedIn</a>
      <a href="https://twitter.com/intent/tweet?url=${encodeURIComponent(window.location.href)}&text=${encodeURIComponent(item.title)}" target="_blank" class="share-btn">Twitter</a>
      <button class="share-btn" onclick="navigator.clipboard.writeText(window.location.href).then(()=>alert('Link copied!'))">Copy Link</button>
    </div>`;
  container.appendChild(footerStrip);

  // Related articles
  const related = allContent.filter(c => c.slug !== slug).slice(0, 3);
  if (related.length) {
    const relSection = document.createElement("section");
    relSection.className = "related-section";
    relSection.innerHTML = `
      <span class="section-tag">Related</span>
      <h2 class="section-title">More from Dr. Balogun</h2>
      <div class="related-grid">
        ${related.map(r => `
          <a href="${r.slug}.html" class="pub-card">
            <span class="pub-tag">${r.tag || r.type}</span>
            <div class="pub-title">${r.title}</div>
            <p class="pub-excerpt">${r.excerpt || ""}</p>
            <div class="pub-footer">
              <span class="pub-date">${r.date}</span>
              <span class="pub-read">Read →</span>
            </div>
          </a>`).join("")}
      </div>`;
    container.appendChild(relSection);
  }
});
</script>
</body>
</html>
