<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Loading...</title>
  <meta http-equiv="refresh" content="0; url=post.html">
  <link rel="stylesheet" href="../../css/main.css">
</head>
<body>
<!--
  BLOG POST ROUTING
  ─────────────────
  Each slug (e.g. "smart-cities-nigeria-next-decade") maps to post.html
  which dynamically loads the correct content from data/content.js.

  In production (WordPress), each post will be a real WP post.
  In this static build, all slugs redirect to post.html which
  reads the filename and finds the matching content entry.

  Individual slug files below are auto-generated by generate-slugs.js
  OR you can create them manually using this pattern:

  smart-cities-nigeria-next-decade.html → redirects to post.html?slug=smart-cities-nigeria-next-decade

  The post.html template handles all rendering.
-->
<script>
  // Read slug from this file's own filename
  const slug = window.location.pathname.split("/").pop().replace(".html","");
  if (slug && slug !== "post") {
    // Rewrite to post.html and pass slug as hash
    window.location.replace("post.html#" + slug);
  }
</script>
</body>
</html>
